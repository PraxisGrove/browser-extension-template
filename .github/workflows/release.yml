name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  package:
    name: Package Extension
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate
        run: |
          pnpm -s compile
          pnpm -s test
          pnpm -s check

      - name: Package Chrome extension
        run: pnpm -s zip

      - name: Package Firefox extension
        run: pnpm -s zip:firefox

      - name: Create draft GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" .output/*.zip \
            --draft \
            --title "$GITHUB_REF_NAME" \
            --notes "Browser extension packages for manual store submission."
